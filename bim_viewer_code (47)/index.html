<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIM Editor: Architectural Blocks with Floor Management</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/panels.css">
    <link rel="stylesheet" href="css/tools.css">

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/BufferGeometryUtils.js"></script>
</head>

<body>
    <div id="main-container">
        <!-- Sidebar -->
        <div id="sidebar">
            <div class="group" data-module="floor-management"></div>
            <div class="group" data-module="asset-library"></div>
            <div class="group" data-module="edit-selection"></div>
            <div class="group" data-module="modeling-tools"></div>
            <div class="group" data-module="properties"></div>
            <div class="group" data-module="finishes-layers"></div>
            <div class="group" data-module="auto-generation"></div>
            <div class="group" data-module="profile-editor"></div>
            <div class="group" data-module="object-stack"></div>
            <div class="group" data-module="steps-display"></div>
        </div>

        <!-- Viewer -->
        <div id="viewer-container" tabindex="0">
            <button id="grid-toggle-btn" onclick="GridManager.toggleGrid()">
                <span class="grid-status-indicator"></span>
                Grid: On
            </button>
            <div id="measure-label"></div>
            <div id="gizmo-bar">
                <button class="tool-btn active-tool" id="mode-translate"
                    onclick="App.setMode('translate')">Move</button>
                <button class="tool-btn" id="mode-rotate" onclick="App.setMode('rotate')">Rotate</button>
                <button class="tool-btn" id="mode-scale" onclick="App.setMode('scale')">Scale</button>


            </div>
            <div id="undo-bar">
                <button class="tool-btn" onclick="HistoryManager.undo()">↶ Undo</button>
                <button class="tool-btn" onclick="HistoryManager.redo()">↷ Redo</button>
                <button class="tool-btn" onclick="GridManager.toggleHelpers()">Helpers</button>
                <button class="tool-btn" onclick="FloorManager.showFloorPanel()">Floors</button>
                <button class="tool-btn" onclick="ExcavationManager.showExcavationPanel()">Excavation</button>
            </div>
            <div id="input-overlay"></div>
        </div>
    </div>

    <!-- Script Panel -->
    <div id="script-panel">
        <div id="script-toolbar">
            <button class="primary" onclick="App.generateScript()">Generate Script</button>
            <button class="primary" onclick="ScriptLoader.loadScript()">Load Script</button>
            <span class="script-note">Note: Custom geometry cannot be scripted.</span>
        </div>
        <textarea id="script-input" placeholder="Paste script here..."></textarea>
        <textarea id="code-area" spellcheck="false"></textarea>
    </div>

    <!-- Floating Panels -->
    <div id="floating-panels">
        <div id="floor-panel" class="floating-panel"></div>
        <div id="excavation-panel" class="floating-panel"></div>
        <div id="align-panel" class="floating-panel"></div>
    </div>

    <!-- Entry Point -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
