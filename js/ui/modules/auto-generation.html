<h4>3. Auto Generation</h4>
<button id="auto-floor-toggle" onclick="App.toggleAutoFloor()">Auto Floor: Off</button>
<button id="auto-roof-toggle" onclick="App.toggleAutoRoof()">Auto Roof: Off</button>

<div style="margin-top: 15px; padding: 10px; background: #2d2d30; border-radius: 4px; border: 1px solid #444;">
    <h5 style="margin: 0 0 8px 0; font-size: 11px; color: #aaa;">Auto Generation Settings</h5>
    
    <label style="font-size: 11px;">Floor Thickness (mm)</label>
    <input type="number" value="200" min="100" max="500" step="10" style="font-size: 11px; margin-bottom: 8px;">
    
    <label style="font-size: 11px;">Roof Thickness (mm)</label>
    <input type="number" value="250" min="100" max="600" step="10" style="font-size: 11px; margin-bottom: 8px;">
    
    <label style="font-size: 11px;">Generation Mode</label>
    <select style="font-size: 11px; margin-bottom: 10px;">
        <option value="bounding">Bounding Box</option>
        <option value="footprint">Footprint</option>
        <option value="custom">Custom Area</option>
    </select>
    
    <div style="display: flex; gap: 5px; margin-top: 10px;">
        <button class="tool-btn" style="flex: 1; font-size: 11px;">Regenerate</button>
        <button class="tool-btn danger" style="flex: 1; font-size: 11px;">Clear All</button>
    </div>
</div>

<div style="margin-top: 15px; font-size: 11px; color: #888;">
    <strong>Note:</strong> Auto-generation creates floors/roofs based on object boundaries
</div>
